version: '3.8'

services:
  video-generator:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./generated_videos:/app/generated_videos
    environment:
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - STABILITY_API_KEY=${STABILITY_API_KEY}
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
