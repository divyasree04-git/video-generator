version: '3.8'

services:
  video-generator:
    build: .
    ports:
      - "3000:3000"
      - "5000:5000"
      - "8080:8080"
    volumes:
      - ./server/generated:/app/server/generated
    environment:
      - NODE_ENV=production
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/styles"]
      interval: 30s
      timeout: 10s
      retries: 3